<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Saikiran Abbineni</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="body-div">
    <header class="top-bar">
        <a href="#" class="logo">&lt;/&gt; Saikiran</a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html" class="active-link">Contact</a>
        </nav>
        <a href="#" class="hire-btn" id="hireBtn">Hire Me</a>
    </header>
    <main class="main-content">
        <div class="left-side">
            <h2 class="main-title">Contact Me</h2>
            <div class="contact-list">
                <div class="contact-line">
                    <i class="fa-regular fa-envelope"></i>
                    <div>
                        <span class="label-text">Email</span>
                        <span class="detail-text">
                            abbinenisaikiran8@gmail.com
</span>
                    </div>

                </div>
                <div class="contact-line">

                    <i class="fa-solid fa-phone"></i>

                    <div>

                        <span class="label-text">Phone</span>

                        <span class="detail-text">

+91 9550138095

</span>

                    </div>

                </div>

                <div class="contact-line">

                    <i class="fa-solid fa-earth-americas"></i>

                    <div>

                        <span class="label-text">Location</span>

                        <span class="detail-text">

Hyderabad, India

</span>

                    </div>

                </div>

                <div class="contact-line">

                    <i class="fa-brands fa-linkedin-in"></i>

                    <div>

                        <span class="label-text">LinkedIn</span>

                        <span class="detail-text">

linkedin.com/in/saikiran-abbineni

</span>

                    </div>

                </div>

                <div class="contact-line">

                    <i class="fa-brands fa-github"></i>

                    <div>

                        <span class="label-text">GitHub</span>

                        <span class="detail-text">

github.com/Abbineni06

</span>

                    </div>

                </div>

            </div>

        </div>

        <div class="right-side">

            <form class="message-form" id="contact-form">

                <div class="form-row">

                    <input

                            type="text"

                            name="from_name"

                            placeholder="Your Name"

                            required

                            class="input-field">

                    <input

                            type="email"

                            name="from_email"

                            placeholder="Your Email"

                            required

                            class="input-field">

                </div>

                <input

                        type="text"

                        name="subject"

                        placeholder="Subject"

                        required

                        class="input-field">

                <textarea

                        name="message"

                        placeholder="Your Message"

                        rows="6"

                        required

                        class="text-field"></textarea>

                <button

                        type="submit"

                        class="submit-btn">

                    Send Message

                    <i class="fa-solid fa-paper-plane"></i>

                </button>

            </form>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="script.js"></script>

</body>

</html>
